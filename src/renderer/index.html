<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar Widget</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div class="glass-container">
      <div class="window-controls">
        <button id="minimize-btn" class="control-btn">_</button>
        <button id="close-btn" class="control-btn">×</button>
      </div>

      <div id="login-screen" class="screen">
        <div class="login-container">
          <h2>📅 Calendar Widget</h2>
          <p id="status-message">Checking for Outlook...</p>
          <button id="retry-btn" class="primary-btn hidden">Retry Connection</button>
        </div>
      </div>

      <div id="main-screen" class="screen hidden">
        <div class="tab-nav">
          <button id="calendar-tab" class="tab-btn active">📅 Calendar</button>
          <button id="actions-tab" class="tab-btn">⚡ Actions</button>
        </div>

        <div class="content">
          <!-- Calendar Tab -->
          <div id="calendar-content" class="tab-content">
            <div class="date-navigation">
              <button id="prev-day" class="nav-btn">←</button>
              <span id="current-date"></span>
              <button id="next-day" class="nav-btn">→</button>
            </div>

            <button id="refresh-btn" class="refresh-btn">↻ Refresh</button>

            <div id="events-list"></div>
          </div>

          <!-- Actions Tab -->
          <div id="actions-content" class="tab-content hidden">
            <div class="actions-header">
              <button id="add-action-btn" class="add-action-btn">
                <span>+</span> Add Action
              </button>
            </div>

            <div id="actions-list"></div>
          </div>

          <!-- Notes View -->
          <div id="notes-view" class="notes-container hidden">
            <div class="notes-header">
              <h3 id="notes-meeting-title"></h3>
              <button id="close-notes-btn" class="close-notes">×</button>
            </div>
            <div class="notes-metadata" id="notes-metadata"></div>
            <textarea id="notes-editor" placeholder="Type your meeting notes here..."></textarea>
            <div class="notes-actions">
              <button id="save-notes-btn" class="primary-btn">Save Notes</button>
              <span id="notes-status"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Action Modal -->
  <div id="action-modal" class="modal-overlay hidden">
    <div class="modal">
      <h3>Add New Action</h3>
      <form id="action-form">
        <div class="form-group">
          <label for="action-title-input">Title</label>
          <input type="text" id="action-title-input" placeholder="e.g., Activate Azure Role" required>
        </div>
        <div class="form-group">
          <label for="action-url-input">URL</label>
          <input type="url" id="action-url-input" placeholder="https://..." required>
        </div>
        <div class="modal-actions">
          <button type="button" id="cancel-action-btn" class="modal-btn modal-btn-secondary">Cancel</button>
          <button type="submit" class="modal-btn modal-btn-primary">Add Action</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
